name: 真我GT6 6.1.118 SukiSU Ultra内核构建

env:
  TZ: Asia/Shanghai
  ANDROID_VERSION: 'android14'
  KERNEL_VERSION: '6.1'
  KERNEL_NAME: 'gt6-11-o-gca13bffobf09'
  CPU: 'sm8650'
  CPUD: 'pineapple'
  BUILD_METHOD: 'gki'

on:
  workflow_dispatch:
    inputs:
      ksu_type:
        description: 'KernelSU分支(SukiSU Ultra/KernelSU Next,默认SukiSU Ultra)'
        required: true
        type: choice
        default: 'sukisu'
        options:
          - 'sukisu'
          - 'ksunext'
      hook_method:
        description: 'hook模式(推荐VFS模式，兼容性更好)'
        required: true
        type: choice
        default: 'manual'
        options:
          - 'manual'
          - 'syscall'
      kpm_enable:
        description: '是否开启kpm(仅对sukisu生效; 可能轻微增加耗电，不需要可保持默认关闭)'
        required: true
        type: choice
        default: 'false'
        options:
          - 'true'
          - 'false'
      lz4_enable:
        description: '是否安装 lz4 1.10.0+zstd 1.5.7 补丁及 LZ4KD 补丁(0=均不安装,1=安装lz4&zstd补丁,2=安装lz4kd补丁,3=均安装,默认2)'
        required: true
        type: choice
        default: '2'
        options:
          - '0'
          - '1'
          - '2'
          - '3'
      bbr_enable:
        description: "是否启用bbr算法(优化上行数据,对手机日用无太大意义甚至可能负优化;false关闭,true仅加入算法,default设为默认)"
        required: true
        type: choice
        default: 'false'
        options:
          - 'false'
          - 'true'
          - 'default'
      better_net:
        description: '是否开启网络功能增强优化配置(优化代理连接,IPV6等功能)'
        required: true
        type: choice
        default: 'true'
        options:
          - 'true'
          - 'false'
      ssg_rekernel_enable:
        description: '是否启用三星SSG IO调度器及Re-Kernel支持(0=均不安装,1=安装SSG IO调度器,2=安装Re-Kernel,3=均安装,默认1)'
        required: true
        type: choice
        default: '1'
        options:
          - '0'
          - '1'
          - '2'
          - '3'
      baseband_guard:
        description: '是否开启内核级基带保护(阻止一切对非用户分区的写入，有效防止格机)'
        required: true
        type: boolean
        default: 'true'
      vfs_enable:
        description: '是否启用手动钩子(VFS)？'
        required: true
        type: boolean
        default: true
      fast_build:
        description: '是否启用极速构建？'
        required: true
        type: boolean
        default: true
      ksu_meta:
        description: 'SukiSU分支名/自定义版本标识(留空使用默认)'
        required: false
        type: string
        default: 'susfs-main/inkdye'
      kernel_suffix:
        description: '内核后缀(留空默认使用随机字符串,开头别加连字符)'
        required: false
        type: string
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      ksuver: ${{ steps.ksu_version.outputs.ksuver }}
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
      CCACHE_MAXSIZE: 8G
    
    steps:
      - name: 检查磁盘空间
        run: df -h

      - name: 最大化构建空间
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 8192
          temp-reserve-mb: 2048
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: 创建并启用3G交换空间
        run: |
          sudo swapoff -a
          sudo fallocate -l 3G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: 配置缓存环境
        run: |
          echo "CCACHE_DIR=$HOME/.ccache_gt6_6.1.118" >> $GITHUB_ENV
          mkdir -p "$HOME/.ccache_gt6_6.1.118"

      - name: 配置Git
        run: |
          git config --global user.name "GT6-Builder"
          git config --global user.email "builder@gt6.com"

      - name: 安装配置环境依赖
        run: |
          sudo apt-mark hold firefox
          sudo apt-mark hold libc-bin
          sudo apt purge man-db
          sudo rm -rf /var/lib/man-db/auto-update
          sudo apt update
          sudo apt-get install -y --no-install-recommends \
            curl bison flex make binutils git perl gcc python3 \
            python-is-python3 bc libssl-dev libelf-dev \
            bc aria2 zip unzip ccache llvm lld libncurses-dev \
            liblz4-tool zlib1g-dev libxml2-utils rsync

      - name: 安装Repo工具
        run: |
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/repo
          chmod a+x ~/repo
          sudo mv ~/repo /usr/local/bin/repo

      - name: 恢复ccache缓存
        uses: actions/cache@v3
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-gt6-6.1.118-${{ runner.os }}-${{ github.event.inputs.fast_build == 'true' && 'fast' || 'standard' }}

      - name: 初始化ccache
        run: |
          mkdir -p "${{ env.CCACHE_DIR }}"
          ccache -M ${{ env.CCACHE_MAXSIZE }}
          ccache -o compression=true
          echo "ccache初始状态:"
          ccache -s

      - name: 初始化Repo并同步源码
        run: |
          mkdir kernel_workspace && cd kernel_workspace
          echo "正在初始化Realme GT6 6.1.118内核源码..."
          repo init -u https://github.com/morannlx/kernel_manifest.git -b refs/heads/realme -m realme_gt6_v_6.1.118.xml --depth=1
          repo sync -c -j$(nproc --all) --no-tags --no-clone-bundle --force-sync
          
          # 移除ABI保护
          if [ -e kernel_platform/common/BUILD.bazel ]; then
            sed -i '/^[[:space:]]*"protected_exports_list"[[:space:]]*:[[:space:]]*"android\/abi_gki_protected_exports_aarch64",$/d' kernel_platform/common/BUILD.bazel
          fi
          if [ -e kernel_platform/msm-kernel/BUILD.bazel ]; then
            sed -i '/^[[:space:]]*"protected_exports_list"[[:space:]]*:[[:space:]]*"android\/abi_gki_protected_exports_aarch64",$/d' kernel_platform/msm-kernel/BUILD.bazel
          fi
          rm kernel_platform/common/android/abi_gki_protected_exports_* || echo "No protected exports!"
          rm kernel_platform/msm-kernel/android/abi_gki_protected_exports_* || echo "No protected exports!"
          
          echo "去除dirty后缀..."
          for f in \
            kernel_platform/common/scripts/setlocalversion \
            kernel_platform/msm-kernel/scripts/setlocalversion; do
            [ -f "$f" ] || continue
            sed -i 's/ -dirty//g' "$f"
            sed -i '$i res=$(echo "$res" | sed '\''s/-dirty//g'\'')' "$f"
          done

      - name: 自定义内核后缀
        run: |
          cd kernel_workspace
          ANDROID_VERSION="${{ env.ANDROID_VERSION }}"
          FAST_BUILD="${{ github.event.inputs.fast_build }}"
          SUFFIX="${{ github.event.inputs.kernel_suffix }}"
          
          if [[ -z "$SUFFIX" ]]; then
          # 生成随机后缀
            RANDOM_DIGIT=$(od -An -N1 -tu1 < /dev/urandom | tr -d '[:space:]' | awk '{print $1 % 11}')
            RANDOM_HASH=$(od -An -N7 -tx1 /dev/urandom | tr -d ' \n')
            SUFFIX="${RANDOM_DIGIT}-o-g${RANDOM_HASH}"
          fi
          
          echo "使用内核后缀: $SUFFIX"
          echo "KERNEL_SUFFIX=$SUFFIX" >> $GITHUB_ENV
          
          for path in \
            kernel_platform/common/scripts/setlocalversion \
            kernel_platform/msm-kernel/scripts/setlocalversion; do
            [ -f "$path" ] || continue
            if [ "$FAST_BUILD" = "true" ]; then
              sed -i "s/^res=.*/res=\"-${ANDROID_VERSION}-${SUFFIX}\"/" "$path"
            else
              tac "$path" | sed "0,/echo \"\\\$res\"/s//res=\\\$(echo \\\$res | cut -d- -f1-2)-${SUFFIX}; echo \"\\\$res\";/" | tac > "$path.tmp" && mv "$path.tmp" "$path"
            fi
            chmod +x "$path"
          done

      - name: 添加SukiSU Ultra
        id: ksu_version
        run: |
          cd kernel_workspace/kernel_platform
          META="${{ github.event.inputs.ksu_meta }}"
          BRANCH_NAME="${META%%/*}"
          CUSTOM_TAG="${META#*/}"
          
          echo "正在配置SukiSU Ultra分支: $BRANCH_NAME"
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s "$BRANCH_NAME"
          
          cd ./KernelSU
          # 获取KSU API版本
          KSU_API_VERSION=$(curl -fsSL "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/$BRANCH_NAME/kernel/Makefile" | \
            grep -m1 "KSU_VERSION_API :=" | awk -F'= ' '{print $2}' | tr -d '[:space:]')
          [ -z "$KSU_API_VERSION" ] && KSU_API_VERSION="3.1.7"
          
          GIT_HASH=$(git rev-parse --short HEAD)
          if [[ -z "$CUSTOM_TAG" || "$CUSTOM_TAG" == "$BRANCH_NAME" ]]; then
            VERSION_FULL="v$KSU_API_VERSION-$GIT_HASH@gt6"
          else
            VERSION_FULL="v$KSU_API_VERSION-$CUSTOM_TAG@gt6[$GIT_HASH]"
          fi
          
          # 更新Makefile中的版本信息
          sed -i '/define get_ksu_version_full/,/endef/d' kernel/Makefile
          sed -i '/KSU_VERSION_API :=/d' kernel/Makefile
          sed -i '/KSU_VERSION_FULL :=/d' kernel/Makefile
          
          VERSION_DEFINITIONS=$'define get_ksu_version_full\n'"$VERSION_FULL"$'\nendef\n\nKSU_VERSION_API := '"$KSU_API_VERSION"$'\nKSU_VERSION_FULL := '"$VERSION_FULL"
          
          awk -v def="$VERSION_DEFINITIONS" '
            /REPO_OWNER :=/ {print; print def; inserted=1; next}
            1
            END {if (!inserted) print def}
          ' kernel/Makefile > kernel/Makefile.tmp && mv kernel/Makefile.tmp kernel/Makefile

          KSU_VERSION=$(expr $(git rev-list --count main 2>/dev/null || echo 13000) + 10700)
          echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
          echo "ksuver=$KSU_VERSION" >> $GITHUB_OUTPUT
          echo "SukiSU版本: $VERSION_FULL"

      - name: 应用SukiSU补丁
        run: |
          cd kernel_workspace
          git clone https://gitlab.com/simonpunk/susfs4ksu.git -b gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}
          git clone https://github.com/ShirkNeko/SukiSU_patch.git
          
          cd kernel_platform
          # 复制susfs补丁
          cp ../susfs4ksu/kernel_patches/50_add_susfs_in_gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch ./common/
          cp ../susfs4ksu/kernel_patches/fs/* ./common/fs/
          cp ../susfs4ksu/kernel_patches/include/linux/* ./common/include/linux/
          
          # 复制隐藏补丁
          cp ../SukiSU_patch/69_hide_stuff.patch ./common/
          
          cd ./common
          # 应用susfs补丁
          patch -p1 < 50_add_susfs_in_gki-${{ env.ANDROID_VERSION }}-${{ env.KERNEL_VERSION }}.patch || true
          # 应用隐藏补丁
          patch -p1 -F 3 < 69_hide_stuff.patch || true

      - name: 应用VFS钩子补丁
        if: ${{ github.event.inputs.vfs_enable == 'true' }}
        run: |
          cd kernel_workspace/kernel_platform/common
          cp ../../SukiSU_patch/hooks/syscall_hooks.patch ./
          echo "正在应用VFS钩子补丁..."
          patch -p1 -F 3 < syscall_hooks.patch || true

      - name: 应用lz4kd补丁
        if: ${{ github.event.inputs.lz4_enable == '2' || github.event.inputs.lz4_enable == '3' }}
        run: |
          cd kernel_workspace/kernel_platform/common
          echo "正在应用lz4kd补丁..."
          cp -r ../../SukiSU_patch/other/zram/lz4k/include/linux/* ./include/linux/
          cp -r ../../SukiSU_patch/other/zram/lz4k/lib/* ./lib
          cp -r ../../SukiSU_patch/other/zram/lz4k/crypto/* ./crypto
          cp ../../SukiSU_patch/other/zram/zram_patch/${{ env.KERNEL_VERSION }}/lz4kd.patch ./
          patch -p1 -F 3 < lz4kd.patch || true

      - name: 应用lz4 1.10.0 & zstd 1.5.7补丁
        if: ${{ github.event.inputs.lz4_enable == '1' || github.event.inputs.lz4_enable == '3' }}
        run: |
          cd kernel_workspace/kernel_platform/common
          echo "正在应用lz4 1.10.0 & zstd 1.5.7补丁..."
          git clone https://github.com/cctv18/oppo_oplus_realme_sm8650.git ../../oppo_sources
          cp ../../oppo_sources/zram_patch/001-lz4.patch ./
          cp ../../oppo_sources/zram_patch/lz4armv8.S ./lib
          cp ../../oppo_sources/zram_patch/002-zstd.patch ./
          git apply -p1 < 001-lz4.patch || true
          patch -p1 < 002-zstd.patch || true

      - name: 配置内核选项
        run: |
          cd kernel_workspace/kernel_platform
          CONFIG_FILE=./common/arch/arm64/configs/gki_defconfig
          
          # SukiSU配置
          echo "CONFIG_KSU=y" >> "$CONFIG_FILE"
          
          # KPM配置
          if [ "${{ github.event.inputs.kpm_enable }}" = "true" ]; then
            echo "CONFIG_KPM=y" >> "$CONFIG_FILE"
          fi
          
          # VFS配置
          if [ "${{ github.event.inputs.vfs_enable }}" = "true" ]; then
            echo "CONFIG_KSU_SUSFS_SUS_SU=n" >> "$CONFIG_FILE"
            echo "CONFIG_KSU_MANUAL_HOOK=y" >> "$CONFIG_FILE"
          else
            echo "CONFIG_KSU_SUSFS_SUS_SU=y" >> "$CONFIG_FILE"
          fi
          
          # SUSFS配置
          echo "CONFIG_KSU_SUSFS=y" >> "$CONFIG_FILE"
          echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> "$CONFIG_FILE"
          echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> "$CONFIG_FILE"
          echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> "$CONFIG_FILE"
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> "$CONFIG_FILE"
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> "$CONFIG_FILE"
          echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> "$CONFIG_FILE"
          echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> "$CONFIG_FILE"
          echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y" >> "$CONFIG_FILE"
          echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> "$CONFIG_FILE"
          echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> "$CONFIG_FILE"
          echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> "$CONFIG_FILE"
          echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> "$CONFIG_FILE"
          echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> "$CONFIG_FILE"
          
          # TMPFS配置
          echo "CONFIG_TMPFS_XATTR=y" >> "$CONFIG_FILE"
          echo "CONFIG_TMPFS_POSIX_ACL=y" >> "$CONFIG_FILE"
          
          # ZRAM配置
          if [[ "${{ github.event.inputs.lz4_enable }}" == "2" || "${{ github.event.inputs.lz4_enable }}" == "3" ]]; then
            echo "CONFIG_CRYPTO_LZ4HC=y" >> "$CONFIG_FILE"
            echo "CONFIG_CRYPTO_LZ4K=y" >> "$CONFIG_FILE"
            echo "CONFIG_CRYPTO_LZ4KD=y" >> "$CONFIG_FILE"
            echo "CONFIG_CRYPTO_842=y" >> "$CONFIG_FILE"
          fi
          
          # BBR配置
          if [[ "${{ github.event.inputs.bbr_enable }}" == "true" || "${{ github.event.inputs.bbr_enable }}" == "default" ]]; then
            echo "CONFIG_TCP_CONG_ADVANCED=y" >> "$CONFIG_FILE"
            echo "CONFIG_TCP_CONG_BBR=y" >> "$CONFIG_FILE"
            if [[ "${{ github.event.inputs.bbr_enable }}" == "default" ]]; then
              echo "CONFIG_DEFAULT_TCP_CONG=bbr" >> "$CONFIG_FILE"
            fi
          fi
          
          # 网络优化
          if [[ "${{ github.event.inputs.better_net }}" == "true" ]]; then
            echo "CONFIG_BPF_STREAM_PARSER=y" >> "$CONFIG_FILE"
            echo "CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y" >> "$CONFIG_FILE"
            echo "CONFIG_IP6_NF_NAT=y" >> "$CONFIG_FILE"
          fi
          
          # SSG调度器
          if [[ "${{ github.event.inputs.ssg_rekernel_enable }}" == "1" || "${{ github.event.inputs.ssg_rekernel_enable }}" == "3" ]]; then
            echo "CONFIG_MQ_IOSCHED_SSG=y" >> "$CONFIG_FILE"
            echo "CONFIG_MQ_IOSCHED_SSG_CGROUP=y" >> "$CONFIG_FILE"
          fi
          
          # Re-Kernel
          if [[ "${{ github.event.inputs.ssg_rekernel_enable }}" == "2" || "${{ github.event.inputs.ssg_rekernel_enable }}" == "3" ]]; then
            echo "CONFIG_REKERNEL=y" >> "$CONFIG_FILE"
          fi
          
          # 编译优化
          echo "CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y" >> "$CONFIG_FILE"
          
          # 移除defconfig检查
          sed -i 's/check_defconfig//' ./common/build.config.gki

      - name: 启用内核级基带保护
        if: ${{ github.event.inputs.baseband_guard == 'true' }}
        run: |
          cd kernel_workspace/kernel_platform
          echo "CONFIG_BBG=y" >> ./common/arch/arm64/configs/gki_defconfig
          cd ./common/security
          wget https://github.com/cctv18/Baseband-guard/archive/refs/heads/master.zip
          unzip -q master.zip
          mv "Baseband-guard-master" baseband-guard
          printf '\nobj-$(CONFIG_BBG) += baseband-guard/\n' >> ./Makefile
          # 简化Kconfig修改
          echo "source \"security/baseband-guard/Kconfig\"" >> ./Kconfig

      - name: 极速构建内核
      if: ${{ github.event.inputs.fast_build == 'true' }}
        run: |
          cd kernel_workspace/kernel_platform
          export PATH="/usr/lib/ccache:$PATH"
          export PATH="$GITHUB_WORKSPACE/kernel_workspace/kernel_platform/prebuilts/clang/host/linux-x86/clang-r487747c/bin:$PATH"
          export CC="ccache clang"
          
          cd common
          MAKE_ARGS="LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- \
            LD=ld.lld HOSTLD=ld.lld KCFLAGS+=-Wno-error"
          
          echo "开始极速构建..."
          make -j$(nproc --all) O=out $MAKE_ARGS gki_defconfig
          make -j$(nproc --all) O=out $MAKE_ARGS
          
          echo "ccache状态："
          ccache -s

      - name: 标准构建内核
        if: ${{ github.event.inputs.fast_build == 'false' }}
        run: |
          cd kernel_workspace
          if [ -f ./kernel_platform/build_with_bazel.py ]; then
            ./kernel_platform/oplus/bazel/oplus_modules_variant.sh ${{ env.CPUD }} ${{ env.BUILD_METHOD }}
            ./kernel_platform/build_with_bazel.py --lto=thin -t ${{ env.CPUD }} ${{ env.BUILD_METHOD }}
          else
            LTO=thin SYSTEM_DLKM_RE_SIGN=0 BUILD_SYSTEM_DLKM=0 KMI_SYMBOL_LIST_STRICT_MODE=0 \
            ./kernel_platform/oplus/build/oplus_build_kernel.sh ${{ env.CPUD }} ${{ env.BUILD_METHOD }}
          fi

      - name: 应用KPM修补
        if: ${{ github.event.inputs.kpm_enable == 'true' && github.event.inputs.ksu_type == 'sukisu' }}
        run: |
          cd kernel_workspace/kernel_platform
          mkdir -p out/Final-Image-Find/
          image_path=$(find "./common/out/" -name "Image" | head -n 1)
          if [ -z "$image_path" ]; then
            image_path=$(find "./out/" -name "Image" | head -n 1)
          fi
          
          if [ -n "$image_path" ] && [ -f "$image_path" ]; then
            cp "$image_path" out/Final-Image-Find/Image
            cd out/Final-Image-Find
            curl -LO https://github.com/ShirkNeko/SukiSU_KernelPatch_patch/releases/download/0.12.0/patch_linux
            chmod +x patch_linux
            ./patch_linux
            cp oImage "$image_path"
          fi

      - name: 制作AnyKernel3刷机包
        run: |
          cd kernel_workspace
          git clone https://github.com/cctv18/AnyKernel3 --depth=1
          rm -rf ./AnyKernel3/.git
          
          # 查找内核镜像
          image_path=$(find "./kernel_platform/common/out/" -name "Image" | head -n 1)
          if [ -z "$image_path" ]; then
            image_path=$(find "./kernel_platform/out/" -name "Image" | head -n 1)
          fi
          
          if [ -n "$image_path" ] && [ -f "$image_path" ]; then
            cp "$image_path" ./AnyKernel3/Image
          else
            echo "未找到内核镜像文件，构建可能出错"
            exit 1
          fi
          
          cd AnyKernel3
          KSU_TYPENAME="SukiSU"
          ZIP_SUFFIX="_VFS${{ github.event.inputs.vfs_enable == 'true' && '_VFS' || '' }}${{ github.event.inputs.lz4_enable == '2' || github.event.inputs.lz4_enable == '3' && '_LZ4KD' || '' }}${{ github.event.inputs.kpm_enable == 'true' && '_KPM' || '' }}"
          
          if [[ -n "${{ env.KERNEL_SUFFIX }}" ]]; then
            zip -r ../AnyKernel3_${KSU_TYPENAME}_${{ env.KSUVER }}_${{ env.KERNEL_VERSION }}_GT6_${{ env.KERNEL_SUFFIX }}${ZIP_SUFFIX}.zip ./*
          else
            zip -r ../AnyKernel3_${KSU_TYPENAME}_${{ env.KSUVER }}_${{ env.KERNEL_VERSION }}_GT6_${{ env.KERNEL_NAME }}${ZIP_SUFFIX}.zip ./*
          fi

      - name: 下载SUSFS模块
        continue-on-error: true
        run: |
          cd kernel_workspace/AnyKernel3
          # 从Release下载最新SUSFS模块
          wget -O ksu_module_susfs_1.5.2+_GT6.zip https://github.com/sidex15/ksu_module_susfs/releases/latest/download/ksu_module_susfs_1.5.2+.zip || echo "SUSFS模块下载失败"

      - name: 下载SukiSU管理器
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd kernel_workspace/AnyKernel3
          # 尝试下载最新SukiSU管理器
          wget -O SukiSU-Ultra.apk https://github.com/SukiSU-Ultra/SukiSU-Ultra/releases/latest/download/manager.apk || echo "管理器下载失败"

      - name: 上传刷机包
        uses: actions/upload-artifact@v4
        with:
          name: GT6_Kernel_${{ env.KSUVER }}_${{ env.KERNEL_VERSION }}
          path: ${{ github.workspace }}/kernel_workspace/AnyKernel3*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: 下载刷机包
        uses: actions/download-artifact@v4
        with:
          name: GT6_Kernel_${{ needs.build.outputs.ksuver }}_${{ env.KERNEL_VERSION }}
          path: ./release_zips

      - name: 创建发布
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "GT6-Kernel-${{ needs.build.outputs.ksuver }}-${{ env.KERNEL_VERSION }}"
          name: "真我GT6 SukiSU内核 v${{ needs.build.outputs.ksuver }}"
          body: |
            ### 📱 真我GT6 Android 14 SukiSU Ultra 内核
            - 内核版本: ${{ env.KERNEL_VERSION }}.118
            - SukiSU版本: ${{ needs.build.outputs.ksuver }}
            - 构建时间: $(date -u +'%Y-%m-%d %H:%M:%S UTC')
            
            ### ⚡ 特性
            - ✅ SukiSU Ultra + SUSFS
            - ✅ VFS手动钩子: ${{ github.event.inputs.vfs_enable }}
            - ✅ KPM支持: ${{ github.event.inputs.kpm_enable }}
            - ✅ LZ4KD压缩: ${{ github.event.inputs.lz4_enable == '2' || github.event.inputs.lz4_enable == '3' }}
            - ✅ 网络优化: ${{ github.event.inputs.better_net }}
            - ✅ 基带保护: ${{ github.event.inputs.baseband_guard }}
            
            ### 📥 安装说明
            1. 通过第三方Recovery刷入
            2. 或使用KernelFlasher应用刷入
            3. 刷入前请备份boot分区
            
            ### ⚠️ 注意事项
            - 刷机有风险，请提前备份数据
            - 如遇问题请及时反馈
          draft: false
          prerelease: false
          files: |
            release_zips/*.zip
```